name: PMD Daily Rainfall Downloader

on:
  schedule:
    # 9:00 AM Pakistan Time = 4:00 AM UTC (Pakistan is UTC+5)
    - cron: '0 4 * * *'
    # 11:00 AM Pakistan Time = 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'How many days back to probe (manual backfill runs only)'
        required: false
        default: '1'

# Prevent two runs from racing to commit/push at the same time.
concurrency:
  group: pmd-rainfall-downloader
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pmd_rainfall_downloader.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyPDF2 beautifulsoup4 pdfplumber

      - name: Run PMD rainfall downloader
        env:
          DAYS_BACK: ${{ github.event.inputs.days_back || '1' }}
        run: |
          python pmd_rainfall_downloader.py --days-back "$DAYS_BACK"

      - name: Commit and push new rainfall data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # First, stash any local changes
          git stash --include-untracked || true
          
          # Pull latest changes from remote
          git pull --rebase origin "${GITHUB_REF_NAME}" || git pull origin "${GITHUB_REF_NAME}"
          
          # Pop stashed changes
          git stash pop || true
          
          # Add the new files
          git add pmd_rainfall_pdfs/
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No new or changed rainfall files — nothing to commit."
          else
            git commit -m "Add PMD rainfall report(s) for $(date -u +'%Y-%m-%d') [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi